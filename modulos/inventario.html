<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante</title>
</head>
<body>
    <h1>modulo de inventario</h1>
    <hr>
    
    <form action="">

        <label for="">categoria</label>
        <input type="text" id="categoria" required placeholder="ingrese la categoria">

        <br>

        <label for="">codigo del producto</label>
        <input type="number" id="codigo_producto" required placeholder="ingrese codigo de producto">

        <br>

        <label for="">nombre del producto</label>
        <input type="text" id="nombre_producto" required placeholder="ingrese nombre del producto">

        <br>

        <label for="">descripcion del producto</label>
        <input type="text" id="descripcion_producto" required placeholder="ingrese descripcion del producto">

        <br>

        <label for="">cantidad de productos</label>
        <input type="number" id="cantidad_productos" required placeholder="ingrese cantidad de productos">

        <br>

        <label for="">precio unitario</label>
        <input type="number" id="precio_unitario" required placeholder="ingrese precio unitario">

        <br>

        <label for="">proveedor</label>
        <input type="text" id="proveedor" required placeholder="ingrese proveedor">

        <br>

        <a href="../index.html">volver al inicio</a>
        <button type="submit">guardar</button>


    </form>
</body>
</html>
